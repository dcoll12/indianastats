<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indiana 2026 Race Map</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #07090f; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #e6edf3; }

/* ── Header ──────────────────────────────────────────────────────────── */
#hdr {
  position: fixed; top: 0; left: 0; right: 0; z-index: 300;
  background: rgba(7,9,15,0.93); backdrop-filter: blur(12px);
  border-bottom: 1px solid #1e2a3a;
  padding: 8px 14px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  min-height: 46px;
}
.back-link { color: #388bfd; font-size: 12px; text-decoration: none; white-space: nowrap; }
.back-link:hover { color: #79c0ff; }
#hdr-title { font-size: 14px; font-weight: 800; color: #f0f6fc; letter-spacing: 0.2px; }
#hdr-sub   { font-size: 10px; color: #556070; margin-top: 1px; }
.ctrl-row  { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; margin-left: auto; }
.cbtn {
  background: #111823; border: 1px solid #253040;
  border-radius: 5px; padding: 4px 10px;
  font-size: 11px; font-weight: 600; color: #7a8a9a;
  cursor: pointer; white-space: nowrap;
  transition: all 0.15s;
}
.cbtn:hover:not(.on) { border-color: #7a8a9a; color: #d0dae6; }
.cbtn.on          { background: #1a4580; border-color: #388bfd; color: #fff; }
.cbtn.on-sd       { background: #4a2a8a; border-color: #a371f7; color: #fff; }
.cbtn.on-hd       { background: #0e5c28; border-color: #3fb950; color: #fff; }
.cbtn.on-web      { background: #5a3800; border-color: #f0a030; color: #fff; }
.cbtn.on-comp     { background: #5a1a00; border-color: #ff6030; color: #fff; }
#node-ct { font-size: 10px; color: #556070; white-space: nowrap; }

/* ── Map SVG ─────────────────────────────────────────────────────────── */
#map-svg {
  position: fixed; top: 46px; left: 0; right: 0; bottom: 0;
  width: 100%; height: calc(100vh - 46px);
  cursor: grab;
}
#map-svg:active { cursor: grabbing; }

/* ── Tooltip ──────────────────────────────────────────────────────────── */
#tip {
  position: fixed; z-index: 500; pointer-events: none;
  background: rgba(13,19,30,0.97); border: 1px solid #1e2a3a;
  border-radius: 8px; padding: 10px 13px; font-size: 12px; max-width: 240px;
  box-shadow: 0 6px 28px rgba(0,0,0,0.7);
  opacity: 0; transition: opacity 0.1s;
}
#tip.show { opacity: 1; }
#tt-name  { font-size: 13px; font-weight: 700; color: #f0f6fc; margin-bottom: 3px; }
#tt-dist  { color: #7a8a9a; font-size: 11px; }
#tt-party { font-weight: 600; font-size: 12px; margin-top: 4px; }
#tt-lean  { color: #556070; font-size: 11px; margin-top: 2px; }
#tt-comp  { font-size: 10px; margin-top: 4px; padding-top: 4px; border-top: 1px solid #1e2a3a; }

/* ── Legend ───────────────────────────────────────────────────────────── */
#legend {
  position: fixed; bottom: 14px; left: 14px; z-index: 300;
  background: rgba(13,19,30,0.93); backdrop-filter: blur(8px);
  border: 1px solid #1e2a3a; border-radius: 8px; padding: 10px 13px; font-size: 11px;
}
#legend h4 { color: #556070; font-size: 9px; text-transform: uppercase; letter-spacing: 0.9px; margin-bottom: 7px; }
.lrow { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; color: #7a8a9a; }
.ldot { border-radius: 50%; flex-shrink: 0; }
.lsep { border-top: 1px solid #1e2a3a; margin: 6px 0; }
.lline { height: 2px; flex-shrink: 0; border-radius: 1px; }

/* ── Loading ─────────────────────────────────────────────────────────── */
#loading {
  position: fixed; inset: 0; z-index: 999;
  background: #07090f;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
}
#loading-spin {
  width: 34px; height: 34px;
  border: 3px solid #1e2a3a; border-top-color: #388bfd;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
#loading-msg { font-size: 13px; color: #7a8a9a; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div id="loading-spin"></div>
  <div id="loading-msg">Loading maps &amp; candidate data…</div>
</div>

<div id="hdr">
  <a href="../" class="back-link">← Power Packs</a>
  <a href="packs.html" class="back-link" style="color:#a371f7">Packs Network →</a>
  <div>
    <div id="hdr-title">Indiana 2026 — Race Map</div>
    <div id="hdr-sub">All legislative races · node size = competitiveness · scroll to zoom · drag to pan</div>
  </div>
  <div class="ctrl-row">
    <button class="cbtn on"   id="btn-cd"  onclick="toggleLayer('cd')">Congressional</button>
    <button class="cbtn on-sd" id="btn-sd"  onclick="toggleLayer('sd')">State Senate</button>
    <button class="cbtn on-hd" id="btn-hd"  onclick="toggleLayer('hd')">State House</button>
    <button class="cbtn on-web" id="btn-web" onclick="toggleLayer('web')">Interlinking Web</button>
    <button class="cbtn" id="btn-comp" onclick="toggleLayer('comp')">Competitive Only</button>
    <span id="node-ct"></span>
  </div>
</div>

<svg id="map-svg"></svg>

<div id="tip">
  <div id="tt-name"></div>
  <div id="tt-dist"></div>
  <div id="tt-party"></div>
  <div id="tt-lean"></div>
  <div id="tt-comp"></div>
</div>

<div id="legend">
  <h4>Legend</h4>
  <div class="lrow"><div class="ldot" style="width:10px;height:10px;background:#3b82f6;box-shadow:0 0 5px #3b82f6aa;"></div>Democrat</div>
  <div class="lrow"><div class="ldot" style="width:10px;height:10px;background:#ef4444;box-shadow:0 0 5px #ef4444aa;"></div>Republican</div>
  <div class="lsep"></div>
  <div class="lrow"><div class="ldot" style="width:6px;height:6px;background:#8b949e;"></div><div class="ldot" style="width:11px;height:11px;background:#8b949e;"></div><div class="ldot" style="width:16px;height:16px;background:#8b949e;"></div>&nbsp;Competitiveness →</div>
  <div class="lrow"><div style="width:12px;height:12px;border-radius:50%;border:2px solid #f0c040;flex-shrink:0;"></div>Toss-up (&lt;5% lean)</div>
  <div class="lsep"></div>
  <div class="lrow"><div class="lline" style="width:18px;background:#f0a03080;"></div>CD → SD web</div>
  <div class="lrow"><div class="lline" style="width:18px;background:#a371f760;"></div>SD → HD web</div>
  <div class="lrow"><div class="lline" style="width:18px;background:#8b949e80;"></div>Same-race link</div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const PARTY_CLR   = { D: '#3b82f6', R: '#ef4444', '': '#6b7280' };
const CHAMBER_CLR = { cd: '#388bfd', sd: '#a371f7', hd: '#3fb950' };
const CHAMBER_LBL = { cd: 'Congressional', sd: 'State Senate', hd: 'State House' };
const TOSSUP = 0.05;    // |in_index| below this = toss-up
const COMP_CUTOFF = 0.3; // competitiveness > this shows in "competitive only"

// Layer visibility state
const layers = { cd: true, sd: true, hd: true, web: true, comp: false };

// ── Radius helpers ────────────────────────────────────────────────────────
function competitiveness(in_index) {
  return Math.max(0, 1 - Math.abs(in_index) / 0.45);
}
function nodeR(chamber, comp) {
  const base  = { cd: 10, sd: 7,  hd: 4  }[chamber] || 4;
  const bonus = { cd: 18, sd: 13, hd: 9  }[chamber] || 9;
  return base + bonus * comp;
}
function packR(chamber, comp, n) {
  if (n <= 1) return 0;
  const base  = { cd: 12, sd: 8, hd: 5 }[chamber] || 5;
  const cBonus = comp * ({ cd: 22, sd: 16, hd: 11 }[chamber] || 11);
  const nBonus = (n - 1) * ({ cd: 7, sd: 5, hd: 4 }[chamber] || 4);
  return base + cBonus + nBonus;
}

// ── Data fetch ────────────────────────────────────────────────────────────
const STATUS = document.getElementById('loading-msg');
function status(msg) { STATUS.textContent = msg; }

Promise.all([
  fetch('../../data.json').then(r => r.json()),
  fetch('../../candidates_2026.json').then(r => r.json()),
  fetch('../../County_Boundaries_of_Indiana_Current.geojson').then(r => r.json()),
  fetch('../../Congressional_District_Boundaries_Current.geojson').then(r => r.json()),
  fetch('../../General_Assembly_Senate_Districts_Current.geojson').then(r => r.json()),
  fetch('../../General_Assembly_House_Districts_Current(1).geojson').then(r => r.json()),
  fetch('../../district_data.json').then(r => r.json()),
]).then(([lean, cands, countyGeo, cdGeo, sdGeo, hdGeo, distData]) => {
  status('Building race map…');
  setTimeout(() => {
    try {
      buildMap(lean, cands, countyGeo, cdGeo, sdGeo, hdGeo, distData);
    } catch(err) {
      status('Error: ' + err.message + ' — ' + (err.stack || '').split('\n')[1]);
    }
  }, 30);
}).catch(err => {
  status('Error loading data: ' + err.message);
});

// ── Build lean lookup ─────────────────────────────────────────────────────
function buildLean(lean) {
  const m = {};
  (lean.congressional || []).forEach(d => { m[`cd-${d.district}`] = { ii: d.in_index || 0, lbl: d.in_index_label || '' }; });
  (lean.senate        || []).forEach(d => { m[`sd-${d.district}`] = { ii: d.in_index || 0, lbl: d.in_index_label || '' }; });
  (lean.house         || []).forEach(d => { m[`hd-${d.district}`] = { ii: d.in_index || 0, lbl: d.in_index_label || '' }; });
  return m;
}

// ── Build centroid map from GeoJSON features ──────────────────────────────
function buildCentroids(features, distProp, prefix, projection) {
  const map = {};
  features.forEach(feat => {
    const raw = feat.properties[distProp];
    const num = parseInt(raw, 10);
    if (!Number.isFinite(num)) return;
    const geo = d3.geoCentroid(feat);
    const px  = projection(geo);
    if (px) map[`${prefix}-${num}`] = { x: px[0], y: px[1] };
  });
  return map;
}

// ── Main build ────────────────────────────────────────────────────────────
function buildMap(lean, cands, countyGeo, cdGeo, sdGeo, hdGeo, distData) {
  const leanMap = buildLean(lean);

  const W = window.innerWidth;
  const H = window.innerHeight - 46;
  const svg = d3.select('#map-svg').attr('width', W).attr('height', H);

  // ── Projection: fit Indiana county GeoJSON ──────────────────────────────
  const proj = d3.geoMercator().fitExtent([[32, 32], [W - 32, H - 32]], countyGeo);
  const path = d3.geoPath().projection(proj);

  // ── Root group must exist before zoom handler fires ─────────────────────
  const gRoot = svg.append('g');

  // ── Zoom / pan ──────────────────────────────────────────────────────────
  const zoom = d3.zoom()
    .scaleExtent([0.6, 40])
    .on('zoom', e => gRoot.attr('transform', e.transform));
  svg.call(zoom);

  // ── Defs: glow filters ──────────────────────────────────────────────────
  const defs = svg.append('defs');
  [['gd', '#3b82f6', 5], ['gr', '#ef4444', 5], ['gtu', '#f0c040', 7]].forEach(([id, c, s]) => {
    const f = defs.append('filter').attr('id', id)
      .attr('x', '-80%').attr('y', '-80%').attr('width', '260%').attr('height', '260%');
    f.append('feGaussianBlur').attr('in', 'SourceGraphic').attr('stdDeviation', s).attr('result', 'b');
    const m = f.append('feMerge');
    m.append('feMergeNode').attr('in', 'b');
    m.append('feMergeNode').attr('in', 'SourceGraphic');
  });

  // ── County map background ───────────────────────────────────────────────
  const gCounty = gRoot.append('g').attr('id', 'g-county');
  gCounty.selectAll('path').data(countyGeo.features).join('path')
    .attr('d', path)
    .attr('fill', '#0c1420')
    .attr('stroke', '#1a2535')
    .attr('stroke-width', 0.6);

  // ── District boundary overlays (very faint) ─────────────────────────────
  const drawBoundaries = (geoData, id, stroke, opacity) => {
    gRoot.append('g').attr('id', id)
      .selectAll('path').data(geoData.features).join('path')
      .attr('d', path)
      .attr('fill', 'none')
      .attr('stroke', stroke)
      .attr('stroke-width', 0.4)
      .attr('stroke-opacity', opacity)
      .attr('pointer-events', 'none');
  };
  drawBoundaries(cdGeo, 'g-cd-bounds', '#388bfd', 0.2);
  drawBoundaries(sdGeo, 'g-sd-bounds', '#a371f7', 0.15);
  drawBoundaries(hdGeo, 'g-hd-bounds', '#3fb950', 0.1);

  // ── Compute centroids ───────────────────────────────────────────────────
  const cdCentroids = buildCentroids(cdGeo.features, 'district',     'cd', proj);
  const sdCentroids = buildCentroids(sdGeo.features, 'district',     'sd', proj);
  const hdCentroids = buildCentroids(hdGeo.features, 'district_2021','hd', proj);
  const allCentroids = { ...cdCentroids, ...sdCentroids, ...hdCentroids };

  // ── Build web links: CD→SD and SD→HD ───────────────────────────────────
  const webLinks = [];
  const sdToHds = distData.sd_to_hds || {};
  const cdToSds = distData.cd_to_sds || {};

  Object.entries(cdToSds).forEach(([cd, sds]) => {
    const src = allCentroids[`cd-${cd}`];
    if (!src) return;
    (sds || []).forEach(sd => {
      const tgt = allCentroids[`sd-${sd}`];
      if (tgt) webLinks.push({ x1: src.x, y1: src.y, x2: tgt.x, y2: tgt.y, type: 'cd-sd' });
    });
  });
  Object.entries(sdToHds).forEach(([sd, hds]) => {
    const src = allCentroids[`sd-${sd}`];
    if (!src) return;
    (hds || []).forEach(hd => {
      const tgt = allCentroids[`hd-${hd}`];
      if (tgt) webLinks.push({ x1: src.x, y1: src.y, x2: tgt.x, y2: tgt.y, type: 'sd-hd' });
    });
  });

  const gWeb = gRoot.append('g').attr('id', 'g-web');
  const webLinkSel = gWeb.selectAll('line').data(webLinks).join('line')
    .attr('x1', d => d.x1).attr('y1', d => d.y1)
    .attr('x2', d => d.x2).attr('y2', d => d.y2)
    .attr('stroke', d => d.type === 'cd-sd' ? '#f0a030' : '#a371f7')
    .attr('stroke-opacity', d => d.type === 'cd-sd' ? 0.18 : 0.13)
    .attr('stroke-width', d => d.type === 'cd-sd' ? 0.8 : 0.5)
    .attr('stroke-dasharray', d => d.type === 'cd-sd' ? '3,5' : '2,6')
    .attr('pointer-events', 'none');

  // ── Build candidate data & positions ────────────────────────────────────
  const allCandNodes = [];
  const raceLinks    = [];

  const chamberMap = { hd: cands.hd || {}, sd: cands.sd || {}, cd: {} }; // cd hidden until after primary

  // Process in order: hd first (back), then sd, then cd (front)
  ['hd', 'sd', 'cd'].forEach(ch => {
    Object.entries(chamberMap[ch]).forEach(([distNum, candidates]) => {
      const distId = `${ch}-${distNum}`;
      const centroid = allCentroids[distId];
      if (!centroid || !candidates.length) return;

      const lInfo = leanMap[distId] || { ii: 0, lbl: '' };
      const comp  = competitiveness(lInfo.ii);
      const n     = candidates.length;
      const pr    = packR(ch, comp, n);

      const distCands = candidates.map((c, i) => {
        const angle = n > 1 ? (2 * Math.PI * i / n) - Math.PI / 2 : 0;
        return {
          id: `${distId}-${i}`,
          name: c.name, party: c.party || '',
          chamber: ch, district: +distNum, distId,
          comp, ii: lInfo.ii, lean_lbl: lInfo.lbl,
          tossup: Math.abs(lInfo.ii) < TOSSUP,
          px: centroid.x + (n > 1 ? pr * Math.cos(angle) : 0),
          py: centroid.y + (n > 1 ? pr * Math.sin(angle) : 0),
          r: nodeR(ch, comp),
        };
      });

      allCandNodes.push(...distCands);

      // Race links within this district
      for (let a = 0; a < distCands.length; a++) {
        for (let b = a + 1; b < distCands.length; b++) {
          raceLinks.push({ src: distCands[a], tgt: distCands[b], chamber: ch });
        }
      }
    });
  });

  // ── Draw race links ─────────────────────────────────────────────────────
  const gRace = gRoot.append('g').attr('id', 'g-race');
  const raceLinkSel = gRace.selectAll('line').data(raceLinks).join('line')
    .attr('x1', d => d.src.px).attr('y1', d => d.src.py)
    .attr('x2', d => d.tgt.px).attr('y2', d => d.tgt.py)
    .attr('stroke', d => {
      const sp = d.src.party, tp = d.tgt.party;
      if (sp === tp) return PARTY_CLR[sp] || '#6b7280';
      return '#c0ccd8'; // contested
    })
    .attr('stroke-opacity', 0.45)
    .attr('stroke-width', d => ({ cd: 1.2, sd: 0.9, hd: 0.6 }[d.chamber] || 0.6))
    .attr('pointer-events', 'none');

  // ── Draw candidate nodes ─────────────────────────────────────────────────
  const gNodes = gRoot.append('g').attr('id', 'g-nodes');
  const nodeSel = gNodes.selectAll('.cn').data(allCandNodes).join('g')
    .attr('class', 'cn')
    .attr('transform', d => `translate(${d.px.toFixed(2)},${d.py.toFixed(2)})`)
    .style('cursor', 'pointer')
    .on('mouseover', showTip)
    .on('mousemove', moveTip)
    .on('mouseout',  hideTip);

  // Toss-up outer glow ring
  nodeSel.append('circle')
    .attr('r', d => d.r + 4.5)
    .attr('fill', 'none')
    .attr('stroke', '#f0c040')
    .attr('stroke-width', 1.5)
    .attr('stroke-opacity', d => d.tossup ? 0.75 : 0)
    .attr('filter', 'url(#gtu)')
    .attr('pointer-events', 'none');

  // Main circle
  nodeSel.append('circle')
    .attr('r', d => d.r)
    .attr('fill', d => PARTY_CLR[d.party] || PARTY_CLR[''])
    .attr('fill-opacity', d => 0.72 + d.comp * 0.22)
    .attr('stroke', d => CHAMBER_CLR[d.chamber])
    .attr('stroke-width', d => d.comp > 0.6 ? 1.5 : 0.7)
    .attr('filter', d => d.party === 'D' ? 'url(#gd)' : 'url(#gr)');

  // Initials (only if radius big enough)
  nodeSel.append('text')
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'central')
    .attr('font-size', d => Math.max(0, d.r * 0.54))
    .attr('font-weight', 700)
    .attr('fill', 'rgba(255,255,255,0.85)')
    .attr('pointer-events', 'none')
    .text(d => d.r >= 9 ? initials(d.name) : '');

  // Name label below node (only for most competitive CD/SD nodes)
  nodeSel.append('text')
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'hanging')
    .attr('font-size', d => (d.chamber === 'cd' && d.comp > 0.4) || (d.chamber === 'sd' && d.comp > 0.6) ? 8 : 0)
    .attr('fill', '#8b949e')
    .attr('pointer-events', 'none')
    .attr('dy', d => d.r + 3)
    .text(d => lastName(d.name));

  // ── District count label ─────────────────────────────────────────────────
  document.getElementById('node-ct').textContent =
    `${allCandNodes.length} candidates · ${Object.keys(allCentroids).length} districts`;

  // ── Store refs & hide loading ────────────────────────────────────────────
  window._S = { nodeSel, raceLinkSel, webLinkSel };
  window._A = allCandNodes;
  document.getElementById('loading').style.display = 'none';

  applyLayers();
}

// ── Layer toggles ─────────────────────────────────────────────────────────
function toggleLayer(key) {
  if (key === 'comp') {
    layers.comp = !layers.comp;
    document.getElementById('btn-comp').classList.toggle('on-comp', layers.comp);
  } else if (key === 'web') {
    layers.web = !layers.web;
    document.getElementById('btn-web').classList.toggle('on-web', layers.web);
  } else {
    layers[key] = !layers[key];
    const onClass = { cd: 'on', sd: 'on-sd', hd: 'on-hd' }[key];
    document.getElementById(`btn-${key}`).classList.toggle(onClass, layers[key]);
  }
  applyLayers();
}

function applyLayers() {
  if (!window._S) return;
  const { nodeSel, raceLinkSel, webLinkSel } = window._S;

  nodeSel.attr('opacity', d => {
    if (!layers[d.chamber]) return 0;
    if (layers.comp && d.comp <= COMP_CUTOFF) return 0;
    return 1;
  }).attr('pointer-events', d => {
    if (!layers[d.chamber]) return 'none';
    if (layers.comp && d.comp <= COMP_CUTOFF) return 'none';
    return 'auto';
  });

  raceLinkSel.attr('opacity', d => {
    if (!layers[d.chamber]) return 0;
    if (layers.comp && d.src.comp <= COMP_CUTOFF) return 0;
    return 1;
  });

  webLinkSel.attr('display', layers.web ? null : 'none');

  // Show/hide district boundary overlays
  ['cd', 'sd', 'hd'].forEach(ch => {
    const el = document.getElementById(`g-${ch}-bounds`);
    if (el) el.style.display = layers[ch] ? '' : 'none';
  });
}

// ── Tooltip ───────────────────────────────────────────────────────────────
function showTip(event, d) {
  const t = document.getElementById('tip');
  document.getElementById('tt-name').textContent = d.name;
  document.getElementById('tt-dist').textContent =
    `${CHAMBER_LBL[d.chamber]} — District ${d.district}`;
  const pEl = document.getElementById('tt-party');
  pEl.textContent = d.party === 'D' ? 'Democrat' : d.party === 'R' ? 'Republican' : d.party || '—';
  pEl.style.color = PARTY_CLR[d.party] || '#8b949e';
  document.getElementById('tt-lean').textContent = d.lean_lbl ? `IN-Index: ${d.lean_lbl}` : '';
  const pct = Math.round(d.comp * 100);
  const fire = d.tossup ? ' 🔥 Toss-up' : '';
  document.getElementById('tt-comp').innerHTML =
    `<span style="color:#556070">Competitiveness: </span>` +
    `<span style="color:${pct >= 60 ? '#f0c040' : '#7a8a9a'}">${pct}%${fire}</span>`;
  t.classList.add('show');
  moveTip(event);
}
function moveTip(event) {
  const t = document.getElementById('tip');
  t.style.left = Math.min(event.clientX + 16, window.innerWidth - 254) + 'px';
  t.style.top  = Math.max(event.clientY - 14, 54) + 'px';
}
function hideTip() { document.getElementById('tip').classList.remove('show'); }

// ── Helpers ───────────────────────────────────────────────────────────────
function initials(name) {
  const p = name.split(/[\s,]+/).filter(w => w.length > 1 && !/^[A-Z]\.$/.test(w));
  if (!p.length) return '?';
  return p.length === 1 ? p[0].slice(0, 2).toUpperCase() : (p[0][0] + p[p.length - 1][0]).toUpperCase();
}
function lastName(name) {
  return name.replace(/,.*$/, '').split(/\s+/).filter(w => !/^[A-Z]\.$|^(Jr|Sr|II|III|IV)\.?$/.test(w)).pop() || '';
}

// ── Reload on resize ──────────────────────────────────────────────────────
window.addEventListener('resize', () => location.reload());
</script>
